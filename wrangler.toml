name = "posthog-mcp-proxy"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "CLIENTS"
id = "PLACEHOLDER_CLIENTS_KV_ID"

[[kv_namespaces]]
binding = "AUTH_CODES"
id = "PLACEHOLDER_AUTH_CODES_KV_ID"

[[kv_namespaces]]
binding = "TOKENS"
id = "PLACEHOLDER_TOKENS_KV_ID"
